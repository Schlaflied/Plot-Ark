services:
  frontend:
    build: ./frontend
    ports:
      - "5173:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file: .env
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    env_file: .env
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6380:6379"
